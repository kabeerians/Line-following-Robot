<!DOCTYPE html>
<html>
<head>

  <title>Robot Control</title>
  <style>
    body {background-color: #fof8ff; font-family: Arial; text-align: center; }
    button { margin: 10px; padding: 15px; font-size: 18px; }
    input[type=range] { width: 300px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
  apiKey: "AIzaSyCUsN2B3mItyfFTcjAsaQV_0uw44nwTd_Q",
  authDomain: "linefollowingrob.firebaseapp.com",
  projectId: "linefollowingrob",
  storageBucket: "linefollowingrob.firebasestorage.app",
  messagingSenderId: "1064510886305",
  appId: "1:1064510886305:web:6572602c9d5dbaf8ea3be0"
};
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
 firebase.auth().signInWithEmailAndPassword("stkatlddn@gmail.com", "Stkatlddnrob@1234")
  .then(user => console.log("Logged in:", user.email))
  .catch(err => console.error("Login failed:", err.message));


    function sendCommand(cmd) {
      db.ref("robot/control").set(cmd);
    }

    function setSpeed(val) {
      db.ref("robot/speed").set(parseInt(val));
    }

    // Listen for speed feedback
    db.ref("robot/currentSpeed").on("value", function(snapshot) {
      document.getElementById("speedDisplay").innerText = "Current Speed: " + snapshot.val();
    });
  </script>
</head>
<body>
  <h1>Robot Control Dashboard</h1>
  <button onclick="sendCommand('forward')">Forward</button>
  <button onclick="sendCommand('left')">Left</button>
  <button onclick="sendCommand('right')">Right</button>
  <button onclick="sendCommand('stop')">Stop</button>
  <br><br>
  <input type="range" min="0" max="1023" value="800" oninput="setSpeed(this.value)">
  <p id="speedDisplay">Current Speed: 800</p>
</body>
</html>
